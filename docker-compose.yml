services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: payments
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d payments"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      # `ping` бывает зелёным до открытия AMQP 5672; `check_port_connectivity` ждёт приёма клиентских подключений
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_port_connectivity"]
      interval: 5s
      timeout: 20s
      retries: 15
      start_period: 30s

  api:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/payments
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      API_KEY: dev-secret-api-key-change-me
      OUTBOX_POLL_INTERVAL_SEC: "0.75"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  consumer:
    build: .
    command: python -m app.consumer.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/payments
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      API_KEY: dev-secret-api-key-change-me
      WEBHOOK_MAX_ATTEMPTS: "3"
      WEBHOOK_BACKOFF_BASE_SEC: "1.0"
      CONSUMER_MAX_PROCESS_RETRIES: "3"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data:
